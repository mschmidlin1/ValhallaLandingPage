<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Valhalla</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("valhalla-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/theme.css?v=35" />
  <link rel="stylesheet" href="css/styles.css?v=35" />
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">Valhalla</h1>
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme"></button>
  </header>

  <main class="page-main">
    <div class="link-grid" id="link-grid"></div>
  </main>

  <div id="coming-soon-banner" class="coming-soon-banner" role="status" aria-live="polite" hidden>
    <span class="coming-soon-banner__message">App coming soon!</span>
  </div>

  <script type="module" src="js/theme.js?v=35"></script>
  <script type="module" src="js/app.js?v=35"></script>
</body>
</html>
